name: Deploy

# Full pipeline: fetch live USGS/CDEC data -> build -> deploy to Cloudflare Workers ->
# ping IndexNow. Runs on every push, weekly (keeps readings fresh), and manually.
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'  # Mondays ~09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch live data (USGS + CDEC)
        run: npm run fetch

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4.80.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Submit to IndexNow
        run: npm run indexnow
