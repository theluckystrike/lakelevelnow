name: Pages

# Build + publish to GitHub Pages (serves lakelevelnow.com), then submit to
# IndexNow once HTTPS is live. Apex A-records point at GitHub Pages IPs.
on:
  push:
    branches: [main]
  schedule:
    - cron: '23 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch live data (USGS + CDEC)
        run: npm run fetch
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit to IndexNow (non-blocking — Bing re-verifies on its own schedule)
        continue-on-error: true
        run: |
          KEY=$(cat .indexnow-key)
          sleep 20
          curl -fsL https://lakelevelnow.com/sitemap-0.xml | grep -oE 'https://lakelevelnow.com[^<]+' | sort -u > /tmp/urls.txt
          U=$(sed 's/.*/"&"/' /tmp/urls.txt | paste -sd, -)
          CODE=$(curl -s -o /tmp/in.json -w "%{http_code}" -X POST -H "Content-Type: application/json" \
            -d "{\"host\":\"lakelevelnow.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://lakelevelnow.com/$KEY.txt\",\"urlList\":[$U]}" \
            https://api.indexnow.org/indexnow)
          echo "IndexNow -> $CODE"
          head -c 200 /tmp/in.json 2>/dev/null || true
