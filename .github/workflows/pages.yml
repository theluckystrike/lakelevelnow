name: Pages

# Build + publish to GitHub Pages (serves lakelevelnow.com), then submit to
# IndexNow once HTTPS is live. Apex A-records point at GitHub Pages IPs.
on:
  push:
    branches: [main]
  schedule:
    - cron: '23 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch live data (USGS + CDEC)
        run: npm run fetch
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sole IndexNow ping for the apex — lives here because pages.yml is what
      # publishes lakelevelnow.com. The script is best-effort (bounded retry +
      # timeout, always exits 0); continue-on-error is a second safety net.
      - name: Submit to IndexNow (non-blocking — Bing re-verifies on its own schedule)
        continue-on-error: true
        run: |
          sleep 20   # let GitHub Pages finish serving the new deploy
          node scripts/indexnow-submit.mjs
