# Cloudflare Workers (Static Assets) config for lakelevelnow.com.
# The apex (lakelevelnow.com) is served by GitHub Pages (Porkbun DNS -> GH Pages IPs).
# This Worker is a secondary preview on the *.workers.dev URL only (no apex routes —
# the Cloudflare zone lives in another account and is intentionally not used here).
name = "lakelevelnow"
compatibility_date = "2026-06-19"
workers_dev = true

[assets]
directory = "./dist"
not_found_handling = "404-page"
